appId: com.afkode.app
productName: AFKode
copyright: Copyright © 2026 YJ

directories:
  output: release
  buildResources: assets

files:
  - dist-electron/**/*
  - dist/**/*
  - assets/**/*
  - node_modules/node-pty/**/*

asar: true
npmRebuild: false
publish: null

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  category: public.app-category.developer-tools
  darkModeSupport: true
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"

dmg:
  title: "${productName}"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-${version}-win-${arch}.${ext}"

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  deleteAppDataOnUninstall: false

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Development
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
