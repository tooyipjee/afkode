<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" />
  <title>AFKode</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="overlay">
    <div id="titlebar">
      <div id="titlebar-left">
        <span id="titlebar-label">AFKode</span>
        <span id="connection-dot"></span>
      </div>
      <div id="tab-bar">
        <div id="tabs"></div>
        <div id="new-tab-area">
          <button id="new-tab-btn" title="New Tab">+</button>
          <button id="shell-picker-btn" title="Choose Shell">&#9662;</button>
        </div>
        <div id="shell-picker" class="dropdown hidden"></div>
      </div>
      <div id="titlebar-right">
        <button id="settings-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <span id="hotkey-hint"></span>
      </div>
    </div>
    <div id="settings-panel" class="hidden"></div>
    <div id="terminal-wrapper"></div>
  </div>
  <script type="module" src="./index.ts"></script>
</body>
</html>
